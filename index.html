<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>经典贪吃蛇</title>
  <style>
    :root {
      --bg:#0b1020; --panel:#121a30; --text:#e8ecff; --muted:#94a3b8;
      --snake:#22c55e; --head:#4ade80; --food:#f43f5e; --grid:#1f2a44;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      background: radial-gradient(circle at 20% 0%, #1a2442, var(--bg));
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",Arial,sans-serif;
      padding:16px;
    }
    .card {
      width:min(95vw, 520px); background:color-mix(in oklab,var(--panel) 90%, black);
      border:1px solid #253252; border-radius:16px; padding:14px;
      box-shadow:0 16px 50px rgba(0,0,0,.35);
    }
    h1 { margin:0 0 8px; font-size:22px; }
    .row { display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:10px; }
    .muted { color:var(--muted); font-size:13px; }
    canvas { width:100%; max-width:480px; aspect-ratio:1/1; background:#0a1326; border:1px solid #2a3a62; border-radius:12px; display:block; margin:auto; }
    .controls-wrap { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:12px; }
    .controls {
      display:grid;
      grid-template-columns:repeat(3,64px);
      grid-template-rows:repeat(3,52px);
      gap:8px;
      justify-content:center;
    }
    .controls .up { grid-column:2; grid-row:1; }
    .controls .left { grid-column:1; grid-row:2; }
    .controls .right { grid-column:3; grid-row:2; }
    .controls .down { grid-column:2; grid-row:3; }
    .controls .empty { grid-column:2; grid-row:2; visibility:hidden; pointer-events:none; }
    @media (max-width: 460px) {
      .controls-wrap { flex-direction:column; }
      .controls { grid-template-columns:repeat(3,56px); grid-template-rows:repeat(3,48px); }
      #restart { width:100%; }
    }
    button {
      border:0; border-radius:10px; padding:10px; font-weight:700; color:white;
      background:#334155; cursor:pointer;
      transition: transform .08s ease, filter .12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.95); filter: brightness(1.15); }
    button.press { transform: scale(0.95); filter: brightness(1.15); }
    .primary { background:#4f46e5; }
    .small-note { margin-top:8px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <h1>🐍 经典贪吃蛇</h1>
    <div class="row">
      <div id="status">按方向键开始</div>
      <div>分数: <strong id="score">0</strong> ｜ 最高: <strong id="best">0</strong></div>
    </div>
    <div class="row" style="margin-top:-4px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);">
        <input id="soundToggle" type="checkbox" /> 声音反馈
      </label>
      <span class="muted">按钮/吃到食物/失败</span>
    </div>
    <canvas id="game" width="480" height="480"></canvas>

    <div class="controls-wrap">
      <div class="controls">
        <button data-dir="up" class="up">⬆️</button>
        <button data-dir="left" class="left">⬅️</button>
        <button class="empty" aria-hidden="true"></button>
        <button data-dir="right" class="right">➡️</button>
        <button data-dir="down" class="down">⬇️</button>
      </div>
      <button class="primary" id="restart">重新开始</button>
    </div>
    <div class="small-note">键盘：↑↓←→ / WASD。手机可点方向按钮。</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const restartBtn = document.getElementById('restart');
    const soundToggle = document.getElementById('soundToggle');

    const N = 20; // 20x20
    const cell = canvas.width / N;

    let snake, dir, nextDir, food, timer, speed, score, over, level;
    const BEST_KEY = 'snake_best_score_v1';
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    bestEl.textContent = best;

    const SOUND_KEY = 'snake_sound_enabled_v1';
    const savedSound = localStorage.getItem(SOUND_KEY);
    let soundEnabled = savedSound === null ? true : savedSound === '1';
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function unlockAudio() {
      try {
        ensureAudio();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        g.gain.value = 0.00001;
        o.connect(g); g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + 0.01);
      } catch (_) {}
    }

    function beep(type='tap') {
      if (!soundEnabled) return;
      try {
        ensureAudio();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if (type === 'tap') { osc.frequency.setValueAtTime(520, now); gain.gain.setValueAtTime(0.0001, now); gain.gain.exponentialRampToValueAtTime(0.05, now+0.01); gain.gain.exponentialRampToValueAtTime(0.0001, now+0.06); osc.stop(now+0.07); }
        else if (type === 'eat') { osc.frequency.setValueAtTime(660, now); osc.frequency.exponentialRampToValueAtTime(980, now+0.08); gain.gain.setValueAtTime(0.0001, now); gain.gain.exponentialRampToValueAtTime(0.08, now+0.01); gain.gain.exponentialRampToValueAtTime(0.0001, now+0.11); osc.stop(now+0.12); }
        else if (type === 'fail') { osc.frequency.setValueAtTime(260, now); osc.frequency.exponentialRampToValueAtTime(120, now+0.22); gain.gain.setValueAtTime(0.0001, now); gain.gain.exponentialRampToValueAtTime(0.1, now+0.02); gain.gain.exponentialRampToValueAtTime(0.0001, now+0.24); osc.stop(now+0.25); }
        else { osc.frequency.setValueAtTime(500, now); gain.gain.setValueAtTime(0.0001, now); gain.gain.exponentialRampToValueAtTime(0.06, now+0.01); gain.gain.exponentialRampToValueAtTime(0.0001, now+0.09); osc.stop(now+0.1); }
        osc.start(now);
      } catch (_) {}
    }

    function randCell() { return { x: Math.floor(Math.random()*N), y: Math.floor(Math.random()*N) }; }

    function spawnFood() {
      let p;
      do {
        p = randCell();
      } while (snake.some(s => s.x === p.x && s.y === p.y));
      return p;
    }

    function reset() {
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0};
      nextDir = {x:1,y:0};
      food = spawnFood();
      score = 0;
      speed = 220; // 初始更慢
      level = 1;
      over = false;
      scoreEl.textContent = '0';
      statusEl.textContent = `进行中（Lv.${level}）`;
      if (timer) clearInterval(timer);
      timer = setInterval(tick, speed);
      draw();
    }

    function setDirection(d) {
      const map = {
        up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}
      };
      const nd = map[d]; if (!nd || over) return;
      if (nd.x === -dir.x && nd.y === -dir.y) return; // 禁止180度回头
      nextDir = nd;
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // 撞墙
      if (head.x < 0 || head.y < 0 || head.x >= N || head.y >= N) return gameOver();
      // 撞自己
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        beep('eat');
        food = spawnFood();
        // 分级提速：每3分升1级，速度更自然
        const newLevel = Math.floor(score / 3) + 1;
        if (newLevel !== level) {
          level = newLevel;
          const ns = Math.max(90, 220 - (level - 1) * 15);
          if (ns !== speed) {
            speed = ns;
            clearInterval(timer);
            timer = setInterval(tick, speed);
          }
        }
        statusEl.textContent = `进行中（Lv.${level}）`;
      } else {
        snake.pop();
      }

      draw();
    }

    function gameOver() {
      over = true;
      clearInterval(timer);
      statusEl.textContent = '游戏结束';
      beep('fail');
      if (score > best) {
        best = score;
        localStorage.setItem(BEST_KEY, String(best));
        bestEl.textContent = best;
      }
      draw(true);
    }

    function draw(isOver=false) {
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // 网格
      ctx.strokeStyle = '#1f2a44';
      ctx.lineWidth = 1;
      for (let i=0;i<=N;i++) {
        ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i*cell); ctx.lineTo(canvas.width,i*cell); ctx.stroke();
      }

      // 食物
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--food');
      roundRect(ctx, food.x*cell+3, food.y*cell+3, cell-6, cell-6, 6, true);

      // 蛇
      snake.forEach((s, idx) => {
        ctx.fillStyle = idx===0
          ? getComputedStyle(document.documentElement).getPropertyValue('--head')
          : getComputedStyle(document.documentElement).getPropertyValue('--snake');
        roundRect(ctx, s.x*cell+2, s.y*cell+2, cell-4, cell-4, 5, true);
      });

      if (isOver) {
        ctx.fillStyle = 'rgba(0,0,0,.45)';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 36px system-ui';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 6);
        ctx.font = '18px system-ui';
        ctx.fillText('点击「重新开始」再来一局', canvas.width/2, canvas.height/2 + 28);
      }
    }

    function roundRect(ctx, x, y, w, h, r, fill=false) {
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
      if (fill) ctx.fill(); else ctx.stroke();
    }


    function feedback(btn) {
      if (btn) {
        btn.classList.add('press');
        setTimeout(() => btn.classList.remove('press'), 80);
      }
      // 静默优先：用震动代替声音（支持设备上生效）
      if (navigator.vibrate) navigator.vibrate(20);
      beep('tap');
    }

    document.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'arrowup' || k === 'w') setDirection('up');
      if (k === 'arrowdown' || k === 's') setDirection('down');
      if (k === 'arrowleft' || k === 'a') setDirection('left');
      if (k === 'arrowright' || k === 'd') setDirection('right');
    });

    document.querySelectorAll('[data-dir]').forEach(btn => {
      btn.addEventListener('click', () => { feedback(btn); setDirection(btn.dataset.dir); });
    });

    restartBtn.addEventListener('click', () => { feedback(restartBtn); reset(); });

    window.addEventListener('pointerdown', unlockAudio, { once:true });
    window.addEventListener('touchstart', unlockAudio, { once:true, passive:true });

    soundToggle.checked = soundEnabled;
    soundToggle.addEventListener('change', () => {
      soundEnabled = soundToggle.checked;
      localStorage.setItem(SOUND_KEY, soundEnabled ? '1' : '0');
      if (soundEnabled) { unlockAudio(); beep('tap'); }
    });

    reset();
  </script>
</body>
</html>
